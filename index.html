<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/assets/images/Devko.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Titre et meta par défaut (remplacés par SEOMeta sur chaque page) -->
    <title>Devko Studio — Agence web à Cannes</title>
    <meta name="description" content="Devko Studio, agence web à Cannes. Création de sites vitrine, e-commerce, applications web et branding sur-mesure. Design moderne, SEO optimisé, livraison rapide." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Devko Studio" />
    <meta name="theme-color" content="#8B5CF6" />

    <!-- Open Graph par défaut -->
    <meta property="og:site_name" content="Devko Studio" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:image" content="https://devko-studio.vercel.app/assets/images/bggg.webp" />

    <!-- Twitter Card par défaut -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts — chargement NON bloquant -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Permanent+Marker&family=Indie+Flower&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Permanent+Marker&family=Indie+Flower&display=swap"
      />
    </noscript>

    <!-- Preload images critiques (LCP) -->
    <link rel="preload" href="/assets/images/bggg.webp" as="image" type="image/webp" />
    <link rel="preload" href="/assets/images/basephone2.png" as="image" type="image/png" />

    <!-- JSON-LD : LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Devko Studio",
      "description": "Agence web à Cannes spécialisée dans la création de sites vitrine, e-commerce, applications web sur-mesure et branding.",
      "url": "https://devko-studio.vercel.app",
      "email": "devkostudio@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Cannes",
        "addressRegion": "Provence-Alpes-Côte d'Azur",
        "addressCountry": "FR"
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 43.5528,
          "longitude": 7.0174
        },
        "geoRadius": "50000"
      },
      "priceRange": "€€",
      "serviceType": ["Création de sites web", "Développement d'applications", "Référencement SEO", "Branding", "Maintenance web"],
      "sameAs": []
    }
    </script>

    <!-- JSON-LD : WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Devko Studio",
      "url": "https://devko-studio.vercel.app"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
